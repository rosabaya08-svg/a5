name: Mock Beta CI

on:
  pull_request:
    branches:
      - main
      - "feat/**"
  push:
    branches:
      - main
      - "feat/**"

permissions:
  contents: read

jobs:
  quality-gate:
    name: lint-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

